repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy (strict)
        entry: .venv/bin/mypy
        language: system
        pass_filenames: false
      - id: pytest-quick
        name: pytest quick
        entry: .venv/bin/pytest -q
        language: system
        pass_filenames: false
