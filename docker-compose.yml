services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ash
      POSTGRES_PASSWORD: ash
      POSTGRES_DB: ash
    ports:
      - "5432:5432"
    volumes:
      - ash-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ash"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn ash.api.app:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      # override the default DSN to reach compose services by name
      POSTGRES_DSN: postgresql://ash:ash@postgres:5432/ash
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # bind-mount the whole project so runtime/ (board specs, state, worktrees) is visible on the host
      - .:/app
      # ── Local repo mounts ──────────────────────────────────────────────────────────────────────────
      # Paths in projects/*.yaml (work.local_repo_path) must resolve *inside* the container.
      # Mount them at the same absolute path so the YAML values work unchanged.
      #
      # Option A — single repo (LOCAL_REPO_PATH=/absolute/path/to/your/clone)
      - ${LOCAL_REPO_PATH:-/tmp}:${LOCAL_REPO_PATH:-/tmp}
      # Option B — multiple projects (LOCAL_REPOS_ROOT=/absolute/parent/of/all/clones)
      #   e.g. LOCAL_REPOS_ROOT=/Users/you/dev  when clones live at /Users/you/dev/plane,
      #   /Users/you/dev/edx/edx-platform, etc.  Both options can coexist; set whichever applies.
      - ${LOCAL_REPOS_ROOT:-/tmp}:${LOCAL_REPOS_ROOT:-/tmp}

volumes:
  ash-postgres:
