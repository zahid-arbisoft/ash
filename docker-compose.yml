services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ash
      POSTGRES_PASSWORD: ash
      POSTGRES_DB: ash
    ports:
      - "5432:5432"
    volumes:
      - ash-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ash"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ash-chroma:/chroma/chroma
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build: .
    command: uvicorn ash.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # override the default DSNs to reach compose services by name
      POSTGRES_DSN: postgresql://ash:ash@postgres:5432/ash
      CHROMA_HOST: chroma
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      # bind-mount the whole project so runtime/ (board specs, state, worktrees) is visible on the host
      - .:/app

volumes:
  ash-postgres:
  ash-chroma:
