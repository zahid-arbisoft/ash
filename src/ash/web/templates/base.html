<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ASH{% endblock %} · Agentic Software House</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --fg:#e6e6e6; --muted:#9aa4b2; --accent:#6ea8fe; --border:#262b35; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
    header { display:flex; gap:1.5rem; align-items:center; padding:1rem 1.5rem; border-bottom:1px solid var(--border); }
    header a { color:var(--fg); text-decoration:none; }
    header .brand { font-weight:700; }
    header nav a { color:var(--muted); margin-left:1rem; }
    header nav a:hover { color:var(--accent); }
    main { max-width:960px; margin:0 auto; padding:1.5rem; }
    h1 { font-size:1.4rem; } h2 { font-size:1.1rem; color:var(--muted); }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; margin:1rem 0; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:.5rem .6rem; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-weight:600; }
    .btn { display:inline-block; background:var(--accent); color:#0b0d10; padding:.5rem .9rem; border-radius:8px; text-decoration:none; font-weight:600; border:none; cursor:pointer; }
    label { display:block; margin:.8rem 0 .25rem; color:var(--muted); }
    input,select { width:100%; padding:.5rem; background:#0f1218; color:var(--fg); border:1px solid var(--border); border-radius:8px; }
    .pill { font-size:.8rem; padding:.1rem .5rem; border-radius:999px; border:1px solid var(--border); color:var(--muted); }
    code,pre { background:#0b0d10; border-radius:6px; }
    pre { padding:1rem; overflow:auto; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">⚙ ASH</a>
    <nav>
      <a href="/ui/connectors">Connectors</a>
      <a href="/ui/runs">Runs</a>
      <a href="/ui/runs/new">New run</a>
      <a href="/admin" target="_blank">Admin</a>
      <a href="/docs" target="_blank">API</a>
    </nav>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
